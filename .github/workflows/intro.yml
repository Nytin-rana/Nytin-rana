name: Generate text animation

on:
  schedule: # execute every 12 hours
    - cron: "* */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Uses a text/grid generator to create a pixelated contribution layout
      - name: Generate Pixel Text Activity Graph
        uses: platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Generates a clean, block-based layout matching the color palette
          outputs: |
            dist/text-grid.svg?color_snake=#A855F7&color_dots=#141413,#FAF9F5,#E8E6DC,#B0AEA5,#A855F7

      - name: push animation to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: text-animation-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
